name: YC after-party monitor

on:
  schedule:
    - cron: '*/10 * * * *'   # heartbeat : GitHub le lance en pratique toutes les 1-4 h
  workflow_dispatch: {}       # bouton "Run workflow" pour tester à la main

permissions:
  contents: write             # pour committer l'état (ci-state/) entre deux passages

concurrency:
  group: yc-monitor
  cancel-in-progress: true    # un nouveau passage remplace l'ancien (pas d'empilement)

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Boucle de surveillance (toutes les 2 min, longue durée)
        env:
          YC_COOKIE: ${{ secrets.YC_COOKIE }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          git config user.name  "yc-monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          # Vérif toutes les 2 min pendant ~5h30 (sous la limite GitHub de 6 h par job).
          # Comme chaque passage dure des heures, la couverture reste quasi-continue
          # même si le planificateur GitHub ne relance le workflow que toutes les 1-4 h.
          end=$(( $(date +%s) + 19800 ))
          while [ "$(date +%s)" -lt "$end" ]; do
            bash check.sh || true
            if [ -n "$(git status --porcelain ci-state)" ]; then
              git add ci-state
              git commit -m "update state [skip ci]" || true
              git pull --rebase --autostash 2>/dev/null || true
              git push || true
            fi
            sleep 120
          done
